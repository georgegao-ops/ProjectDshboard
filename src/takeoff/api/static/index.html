<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takeoff — Upload Drawing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f4;
      color: #1c1917;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.10), 0 4px 16px rgba(0,0,0,.06);
      padding: 40px 48px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    p.subtitle {
      font-size: 0.875rem;
      color: #78716c;
      margin-bottom: 28px;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #d6d3d1;
      border-radius: 8px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }

    #drop-zone.dragover {
      border-color: #2563eb;
      background: #eff6ff;
    }

    #drop-zone svg {
      width: 40px;
      height: 40px;
      color: #a8a29e;
      margin-bottom: 12px;
    }

    #drop-zone p {
      font-size: 0.9rem;
      color: #57534e;
    }

    #drop-zone span {
      color: #2563eb;
      font-weight: 500;
      text-decoration: underline;
      cursor: pointer;
    }

    #drop-zone small {
      display: block;
      margin-top: 6px;
      font-size: 0.75rem;
      color: #a8a29e;
    }

    /* Hidden real file input */
    #file-input { display: none; }

    /* Selected file pill */
    #file-pill {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      padding: 10px 14px;
      background: #f5f5f4;
      border-radius: 6px;
      font-size: 0.85rem;
    }

    #file-pill svg { flex-shrink: 0; color: #dc2626; }
    #file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #file-remove {
      background: none; border: none; cursor: pointer;
      color: #a8a29e; font-size: 1rem; line-height: 1;
      flex-shrink: 0;
    }
    #file-remove:hover { color: #1c1917; }

    /* Upload button */
    #upload-btn {
      margin-top: 20px;
      width: 100%;
      padding: 11px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }

    #upload-btn:hover:not(:disabled) { background: #1d4ed8; }
    #upload-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* Status area */
    #status {
      margin-top: 20px;
      font-size: 0.85rem;
      border-radius: 6px;
      padding: 12px 14px;
      display: none;
    }

    #status.info    { background: #eff6ff; color: #1d4ed8; }
    #status.success { background: #f0fdf4; color: #166534; }
    #status.error   { background: #fef2f2; color: #991b1b; }

    /* Result block */
    #result {
      margin-top: 16px;
      background: #f5f5f4;
      border-radius: 6px;
      padding: 14px;
      font-size: 0.8rem;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Upload Drawing</h1>
  <p class="subtitle">Upload a CAD-exported PDF to begin the takeoff pipeline.</p>

  <div id="drop-zone" role="button" tabindex="0" aria-label="Drop zone for PDF upload">
    <!-- Cloud upload icon -->
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M12 16.5v-9m0 0-3 3m3-3 3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.338-2.32 3.75 3.75 0 0 1 3.65 5.098A4.5 4.5 0 0 1 17.25 19.5H6.75Z" />
    </svg>
    <p>Drag &amp; drop your PDF here, or <span id="browse-link">browse</span></p>
    <small>PDF files only</small>
    <input type="file" id="file-input" accept=".pdf" />
  </div>

  <div id="file-pill">
    <!-- PDF icon -->
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <span id="file-name"></span>
    <button id="file-remove" title="Remove file" aria-label="Remove selected file">&times;</button>
  </div>

  <button id="upload-btn" disabled>Upload</button>

  <div id="status" role="status" aria-live="polite"></div>
  <pre id="result"></pre>
</div>

<script>
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const browseLink = document.getElementById('browse-link');
  const filePill   = document.getElementById('file-pill');
  const fileName   = document.getElementById('file-name');
  const fileRemove = document.getElementById('file-remove');
  const uploadBtn  = document.getElementById('upload-btn');
  const status     = document.getElementById('status');
  const result     = document.getElementById('result');

  let selectedFile = null;

  // --- File selection helpers ---

  function selectFile(file) {
    if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
      showStatus('error', 'Only PDF files are accepted.');
      return;
    }
    selectedFile = file;
    fileName.textContent = file.name;
    filePill.style.display = 'flex';
    uploadBtn.disabled = false;
    clearStatus();
  }

  function clearSelection() {
    selectedFile = null;
    fileInput.value = '';
    filePill.style.display = 'none';
    uploadBtn.disabled = true;
    clearStatus();
  }

  // --- Status helpers ---

  function showStatus(type, message) {
    status.className = type;
    status.textContent = message;
    status.style.display = 'block';
  }

  function clearStatus() {
    status.style.display = 'none';
    result.style.display = 'none';
    result.textContent = '';
  }

  // --- Drag & drop ---

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  ['dragleave', 'dragend'].forEach(evt =>
    dropZone.addEventListener(evt, () => dropZone.classList.remove('dragover'))
  );

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) selectFile(file);
  });

  // --- Click to browse ---

  browseLink.addEventListener('click', (e) => {
    e.stopPropagation();
    fileInput.click();
  });

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') fileInput.click();
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) selectFile(fileInput.files[0]);
  });

  // --- Remove selection ---

  fileRemove.addEventListener('click', (e) => {
    e.stopPropagation();
    clearSelection();
  });

  // --- Upload ---

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    uploadBtn.disabled = true;
    showStatus('info', 'Uploading…');
    result.style.display = 'none';

    const form = new FormData();
    form.append('file', selectedFile);

    try {
      const res = await fetch('/drawings/', { method: 'POST', body: form });
      const data = await res.json();

      if (res.ok) {
        showStatus('success', 'Upload successful! Drawing stored for processing.');
        result.textContent = JSON.stringify(data, null, 2);
        result.style.display = 'block';
        clearSelection();
      } else {
        showStatus('error', data.detail ?? 'Upload failed.');
        uploadBtn.disabled = false;
      }
    } catch (err) {
      showStatus('error', 'Network error — could not reach the server.');
      uploadBtn.disabled = false;
    }
  });
</script>

</body>
</html>
